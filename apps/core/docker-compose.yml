version: '3.8'
services:
  app:
    build: .
    container_name: storecraft-core-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    volumes:
      - ./data.sqlite:/usr/src/app/data.sqlite
      - ./storage:/usr/src/app/storage
    command: sh -c "npm run migrate && node index.js"
    restart: unless-stopped
