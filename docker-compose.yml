services:
  db:
    image: postgres:16-alpine
    container_name: mugs-db
    environment:
      POSTGRES_USER: mugs
      POSTGRES_PASSWORD: mugs
      POSTGRES_DB: mugs
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: apps/django/Dockerfile
    container_name: mugs-django
    environment:
      - DEBUG=False
      - SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=postgres://mugs:mugs@db:5432/mugs
      - ALLOWED_HOSTS=backshop.app.moonsbow.com,django,localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=https://mugs.app.moonsbow.com,http://localhost:4321
      - PRINTFUL_API_TOKEN=${PRINTFUL_API_TOKEN}
      - PRINTFUL_STORE_ID=${PRINTFUL_STORE_ID:-}
      - PRINTFUL_WEBHOOK_SECRET=${PRINTFUL_WEBHOOK_SECRET:-}
      - PRINTFUL_BASE_URL=${PRINTFUL_BASE_URL:-https://api.printful.com}
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.backstore.rule=Host(`backshop.app.moonsbow.com`)"
      - "traefik.http.routers.backstore.entrypoints=websecure"
      - "traefik.http.routers.backstore.tls.certResolver=letsencrypt"
      - "traefik.http.routers.backstore.service=backstore-service"
      - "traefik.http.services.backstore-service.loadbalancer.server.port=8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DJANGO_API_URL=http://django:8080
    container_name: mugs-web
    environment:
      - DJANGO_API_URL=http://django:8080
      - HOST=0.0.0.0
      - PORT=4321
      - PRINTFUL_WEBHOOK_SECRET=${PRINTFUL_WEBHOOK_SECRET:-}
    networks:
      - dokploy-network
    depends_on:
      - django
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mugs-web.rule=Host(`mugs.app.moonsbow.com`)"
      - "traefik.http.routers.mugs-web.entrypoints=websecure"
      - "traefik.http.routers.mugs-web.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mugs-web.service=mugs-web-service"
      - "traefik.http.services.mugs-web-service.loadbalancer.server.port=4321"

volumes:
  postgres-data:

networks:
  dokploy-network:
    external: true
