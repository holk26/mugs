services:
  core:
    build:
      context: ./apps/core
    container_name: mugs-core
    env_file:
      - ./apps/core/.env
    volumes:
      - ./apps/core/data:/usr/src/app/data
      - ./apps/core/storage:/usr/src/app/storage
    ports:
      - "8080:8080"
    networks:
      - mugs
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: mugs-web
    environment:
      - CORE_API_URL=http://core:8080
      - HOST=0.0.0.0
      - PORT=4321
    ports:
      - "4321:4321"
    depends_on:
      - core
    networks:
      - mugs
    restart: unless-stopped

networks:
  mugs:
    driver: bridge
