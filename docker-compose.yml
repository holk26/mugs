services:
  core:
    build:
      context: ./apps/core
      dockerfile: Dockerfile
    container_name: mugs-core
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - SC_AUTH_SECRET_ACCESS_TOKEN=${SC_AUTH_SECRET_ACCESS_TOKEN}
      - SC_AUTH_SECRET_REFRESH_TOKEN=${SC_AUTH_SECRET_REFRESH_TOKEN}
      - SC_AUTH_SECRET_FORGOT_PASSWORD_TOKEN=${SC_AUTH_SECRET_FORGOT_PASSWORD_TOKEN}
      - SC_AUTH_SECRET_CONFIRM_EMAIL_TOKEN=${SC_AUTH_SECRET_CONFIRM_EMAIL_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LIBSQL_VECTOR_URL=${LIBSQL_VECTOR_URL:-file:vector-local.db}
      - LIBSQL_URL=${LIBSQL_URL:-file:data.db}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    volumes:
      - core-data:/usr/src/app/data
      - core-storage:/usr/src/app/storage
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.diego-store.rule=Host(`diego.store.app.moonsbow.com`)"
      - "traefik.http.routers.diego-store.entrypoints=websecure"
      - "traefik.http.routers.diego-store.tls.certResolver=letsencrypt"
      - "traefik.http.routers.diego-store.service=diego-store-service"
      - "traefik.http.services.diego-store-service.loadbalancer.server.port=8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mugs-web
    environment:
      - CORE_API_URL=http://core:8080
      - HOST=0.0.0.0
      - PORT=4321
    networks:
      - dokploy-network
    depends_on:
      - core
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mugs-web.rule=Host(`mugs.store.app.moonsbow.com`)"
      - "traefik.http.routers.mugs-web.entrypoints=websecure"
      - "traefik.http.routers.mugs-web.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mugs-web.service=mugs-web-service"
      - "traefik.http.services.mugs-web-service.loadbalancer.server.port=4321"

volumes:
  core-data:
  core-storage:

networks:
  dokploy-network:
    external: true
