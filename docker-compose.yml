services:
  db:
    image: postgres:16-alpine
    container_name: mugs-db
    environment:
      POSTGRES_USER: mugs
      POSTGRES_PASSWORD: mugs
      POSTGRES_DB: mugs
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mugs-redis
    networks:
      - dokploy-network
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: apps/django/Dockerfile
    container_name: mugs-django
    environment:
      - DEBUG=False
      - SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=postgres://mugs:mugs@db:5432/mugs
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=backshop.app.moonsbow.com,django,localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=https://mugs.app.moonsbow.com,http://localhost:4321
      - PRINTFUL_API_TOKEN=${PRINTFUL_API_TOKEN}
      - PRINTFUL_STORE_ID=${PRINTFUL_STORE_ID:-}
      - PRINTFUL_WEBHOOK_SECRET=${PRINTFUL_WEBHOOK_SECRET:-}
      - PRINTFUL_BASE_URL=${PRINTFUL_BASE_URL:-https://api.printful.com}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-orders@recuerdomomentos.com}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    volumes:
      - django-media:/app/storage/media
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.backstore.rule=Host(`backshop.app.moonsbow.com`)"
      - "traefik.http.routers.backstore.entrypoints=websecure"
      - "traefik.http.routers.backstore.tls.certResolver=letsencrypt"
      - "traefik.http.routers.backstore.service=backstore-service"
      - "traefik.http.services.backstore-service.loadbalancer.server.port=8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DJANGO_API_URL=http://django:8080
        - PUBLIC_STRIPE_PUBLISHABLE_KEY=${PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: mugs-web
    environment:
      - DJANGO_API_URL=http://django:8080
      - HOST=0.0.0.0
      - PORT=4321
      - PRINTFUL_WEBHOOK_SECRET=${PRINTFUL_WEBHOOK_SECRET:-}
      - PUBLIC_STRIPE_PUBLISHABLE_KEY=${PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    networks:
      - dokploy-network
    depends_on:
      - django
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mugs-web.rule=Host(`mugs.app.moonsbow.com`)"
      - "traefik.http.routers.mugs-web.entrypoints=websecure"
      - "traefik.http.routers.mugs-web.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mugs-web.service=mugs-web-service"
      - "traefik.http.services.mugs-web-service.loadbalancer.server.port=4321"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        - VITE_API_URL=http://django:8080
    container_name: mugs-dashboard
    environment:
      - VITE_API_URL=http://django:8080
    networks:
      - dokploy-network
    depends_on:
      - django
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mugs-dashboard.rule=Host(`admin.app.moonsbow.com`)"
      - "traefik.http.routers.mugs-dashboard.entrypoints=websecure"
      - "traefik.http.routers.mugs-dashboard.tls.certResolver=letsencrypt"
      - "traefik.http.routers.mugs-dashboard.service=mugs-dashboard-service"
      - "traefik.http.services.mugs-dashboard-service.loadbalancer.server.port=80"

  celery:
    build:
      context: .
      dockerfile: apps/django/Dockerfile
    container_name: mugs-celery
    command: celery -A config worker -l info
    environment:
      - DATABASE_URL=postgres://mugs:mugs@db:5432/mugs
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DEBUG=False
      - ALLOWED_HOSTS=backshop.app.moonsbow.com,django,localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=https://mugs.app.moonsbow.com,https://admin.app.moonsbow.com,http://localhost:4321,http://localhost:5173
      - PRINTFUL_API_TOKEN=${PRINTFUL_API_TOKEN}
      - PRINTFUL_STORE_ID=${PRINTFUL_STORE_ID:-}
      - PRINTFUL_WEBHOOK_SECRET=${PRINTFUL_WEBHOOK_SECRET:-}
      - PRINTFUL_BASE_URL=${PRINTFUL_BASE_URL:-https://api.printful.com}
    depends_on:
      - db
      - redis
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres-data:
  django-media:

networks:
  dokploy-network:
    external: true
